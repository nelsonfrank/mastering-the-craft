version: "3.9"

services:
  traefik:
    image: traefik:v3.2
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP
      - "443:443"    # HTTPS
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_cert:/letsencrypt
    networks:
      - proxy-network
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=your-email@example.com
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.yourdomain.com`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=admin:$$apr1$$...hashedpassword..."

  nestjs-app:
    build: .
    image: my-nestjs-app:${TAG:-latest}
    restart: unless-stopped
    user: "1001:1001"
    read_only: true
    cap_drop:
      - ALL
    networks:
      - proxy-network          # Same network as Traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nestjs.rule=Host(`api.yourdomain.com`)"   # Change domain
      - "traefik.http.routers.nestjs.entrypoints=websecure"
      - "traefik.http.routers.nestjs.tls.certresolver=letsencrypt"
      - "traefik.http.services.nestjs.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.nestjs-compress.compress=true"
      - "traefik.http.middlewares.nestjs-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.nestjs-ratelimit.ratelimit.burst=150"
    depends_on:
      - postgres

  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    networks:
      - internal-network       # Separate network (more secure)
    # ... (same as before)

networks:
  proxy-network:
    driver: bridge
  internal-network:
    internal: true               # No external access

volumes:
  traefik_cert:
  postgres_data:



# How the Routing Works

# User visits https://api.yourdomain.com
# Traefik receives the request on port 443
# Traefik automatically gets/renews Let's Encrypt certificate
# Traefik looks at the Docker labels on the nestjs-app container
# It forwards the request to http://nestjs-app:3000
# Response goes back through Traefik to the user


# Security Benefits of This Setup

# NestJS container has no exposed ports to the internet
# All traffic is forced through HTTPS
# Automatic certificate management
# Rate limiting applied at the proxy layer
# Basic auth possible for dashboard
# Services can be on isolated internal networks