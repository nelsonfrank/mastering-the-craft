version: "3.9"

services:
  nestjs-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TIME: ${BUILD_TIME}
        COMMIT_SHA: ${COMMIT_SHA}
    image: my-nestjs-app:${TAG:-latest}
    container_name: nestjs-app
    restart: unless-stopped
    user: "1001:1001"                    # Non-root user
    read_only: true                       # Read-only root filesystem
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # cap_add:                            # Only add if absolutely needed
    #   - NET_BIND_SERVICE
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      # Add other env vars here (never hardcode secrets)
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:                               # Swarm mode / resource limits
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16.4-alpine3.21
    container_name: nestjs-postgres
    restart: unless-stopped
    user: "999:999"                       # Postgres default non-root
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  app-network:
    driver: bridge
    internal: false                       # Set to true in production if no external access needed
    driver_opts:
      com.docker.network.bridge.enable_icc: "false"   # Disable inter-container communication if not needed

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      device: ${PWD}/data/postgres
      o: bind